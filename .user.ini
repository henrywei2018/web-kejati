; PHP-FPM settings for cPanel hosting
; These override server defaults for this application only.
; Changes take effect within ~5 minutes (PHP-FPM cache TTL).
;
; Root cause of /livewire/update 404 on long content:
;   PHP silently drops the entire POST body when it exceeds post_max_size
;   or contains more variables than max_input_vars. Livewire receives an
;   empty snapshot, cannot find the component, and returns 404.

; Allow larger POST bodies (Livewire sends full component state on every update)
post_max_size = 64M
upload_max_filesize = 64M

; Allow more input variables (Livewire + Filament form state = many nested keys)
max_input_vars = 10000
max_input_nesting_level = 128

; Give PHP enough time to process large content saves
max_execution_time = 120
max_input_time = 120
memory_limit = 256M
